<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,700&family=Source+Sans+3:wght@400&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 630px; background: #1E3A5F; overflow: hidden; position: relative; }
    .beam {
      position: absolute;
      top: -200px;
      left: -100px;
      width: 600px;
      height: 1200px;
      background: linear-gradient(120deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 60%);
      transform: rotate(-25deg);
    }
    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 420px;
      color: rgba(255,255,255,0.04);
      user-select: none;
      line-height: 1;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      width: 100%;
      padding: 0 80px;
    }
    h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 112px;
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 24px;
    }
    p {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 38px;
      font-weight: 400;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="beam"></div>
  <div class="watermark">∫</div>
  <div class="content">
    <h1>Calculus Solver</h1>
    <p>Step-by-step math solutions</p>
  </div>
</body>
</html>
